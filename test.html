<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>QuizData з”ҹжҲҗеҷЁпјҲaId иҮӘеҠЁеўһй•ҝпј?/title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <link rel="preconnect" href="https://consent.cookiebot.com">
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="dns-prefetch" href="https://consent.cookiebot.com">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 0 15px;
    }
    h1 { font-size: 22px; }
    input, textarea {
      width: 100%;
      padding: 6px;
      margin: 4px 0 10px;
      box-sizing: border-box;
    }
    .question, .answer {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .answers { margin-left: 20px; }
    button {
      padding: 6px 10px;
      margin: 4px;
      border-radius: 6px;
      border: 1px solid #2b7cff;
      background-color: #2b7cff;
      color: white;
      cursor: pointer;
    }
    button.secondary {
      background: #f2f2f2;
      color: #333;
      border-color: #ccc;
    }
    textarea#output {
      height: 250px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<h1>QuizData з”ҹжҲҗеҷЁпјҲaId иҮӘеҠЁеўһй•ҝпј?/h1>

<label>ж Үйўҳ (title)</label>
<input id="titleInput" placeholder="иҜ·иҫ“е…?quiz ж Үйўҳ" />

<label>дё»еӣҫж–Үд»¶еҗҚжҲ– URL (mainPic)</label>
<input id="mainPicInput" placeholder="дҫӢеҰӮпјҡmain.jpg жҲ?https://..." />

<label>дё»йўҳж Үзӯҫ (themsпјҢз”ЁйҖ—еҸ·еҲҶйҡ”)</label>
<input id="themsInput" placeholder="дҫӢеҰӮпјҡChat, PersonnalitГ©, VR" />

<h2>й—®йўҳеҲ—иЎЁ</h2>
<div id="questionsContainer"></div>
<button id="addQuestionBtn">пј?ж·»еҠ й—®йўҳ</button>

<h2>з”ҹжҲҗзҡ?quizData JS</h2>
<textarea id="output" readonly></textarea><br>
<button id="generateBtn">з”ҹжҲҗ quizData</button>
<button id="copyBtn" class="secondary">еӨҚеҲ¶еҲ°еүӘиҙҙжқҝ</button>
<button id="downloadBtn" class="secondary">дёӢиҪҪ JS ж–Үд»¶</button>

<script>
  const container = document.getElementById("questionsContainer");
  const output = document.getElementById("output");

  // ж·»еҠ ж–°й—®йў?
  function addQuestion(data = null) {
    const qDiv = document.createElement("div");
    qDiv.className = "question";

    qDiv.innerHTML = `
      <label>й—®йўҳж–Үжң¬ (question)</label>
      <input class="qText" placeholder="иҫ“е…Ҙйўҳзӣ®" value="${data?.question || ''}">
      <label>йўҳзӣ®еӣҫзүҮж–Үд»¶еҗҚжҲ– URL (pic)</label>
      <input class="qPic" placeholder="pic.jpg жҲ?https://..." value="${data?.pic || ''}">
      <div class="answers">
        <h4>зӯ”жЎҲйҖүйЎ№</h4>
        <div class="answersContainer"></div>
        <button class="addAnswerBtn" type="button">пј?ж·»еҠ зӯ”жЎҲ</button>
      </div>
      <button class="removeQ secondary" type="button">еҲ йҷӨжӯӨй—®йў?/button>
    `;

    const answersContainer = qDiv.querySelector(".answersContainer");
    const addAnswerBtn = qDiv.querySelector(".addAnswerBtn");
    addAnswerBtn.addEventListener("click", () => addAnswer(answersContainer));

    qDiv.querySelector(".removeQ").addEventListener("click", () => {
      qDiv.remove();
    });

    // еҰӮжһңжңүйў„зҪ®зӯ”жЎ?
    if (data?.answers) {
      data.answers.forEach(ans => addAnswer(answersContainer, ans));
    }

    container.appendChild(qDiv);
  }

  // иҮӘеҠЁиҺ·еҸ–дёӢдёҖдё?aId
  function getNextAId(answersContainer) {
    const existing = [...answersContainer.querySelectorAll(".aId")].map(
            i => Number(i.value) || 0
    );
    return existing.length ? Math.max(...existing) + 1 : 1;
  }

  // ж·»еҠ зӯ”жЎҲ
  function addAnswer(container, data = null) {
    const nextId = data?.aId || getNextAId(container);
    const div = document.createElement("div");
    div.className = "answer";
    div.innerHTML = `
      <label>зӯ”жЎҲж–Үжң¬ (answer)</label>
      <input class="aText" placeholder="иҫ“е…Ҙзӯ”жЎҲ" value="${data?.answer || ''}">
      <label>зӯ”жЎҲеӣҫзүҮ (aPicпјҢеҸҜз•ҷз©ә)</label>
      <input class="aPic" placeholder="a.jpg жҲ?https://..." value="${data?.aPic || ''}">
      <label>зӯ”жЎҲID (aId)</label>
      <input type="number" class="aId" value="${nextId}" readonly style="background:#f9f9f9;">
      <button class="removeA secondary" type="button">еҲ йҷӨзӯ”жЎҲ</button>
    `;
    div.querySelector(".removeA").addEventListener("click", () => div.remove());
    container.appendChild(div);
  }

  // з”ҹжҲҗ quizData
  function generateQuizData() {
    const title = document.getElementById("titleInput").value.trim();
    const mainPic = document.getElementById("mainPicInput").value.trim();
    const thems = document.getElementById("themsInput").value.split(",").map(t => t.trim()).filter(Boolean);
    const questions = [];

    document.querySelectorAll(".question").forEach(q => {
      const questionText = q.querySelector(".qText").value.trim();
      const pic = q.querySelector(".qPic").value.trim();
      const answers = [];
      q.querySelectorAll(".answer").forEach(a => {
        answers.push({
          answer: a.querySelector(".aText").value.trim(),
          aPic: a.querySelector(".aPic").value.trim(),
          aId: Number(a.querySelector(".aId").value.trim()) || 0
        });
      });
      if (questionText) questions.push({ question: questionText, pic, answers });
    });

    const quizData = {
      title,
      mainPic,
      thems,
      questions,
      toAnswer: 10000
    };

    const jsText = "let quizData = " + JSON.stringify(quizData, null, 2) + ";";
    output.value = jsText;
    return jsText;
  }

  // дәӢд»¶з»‘е®ҡ
  document.getElementById("addQuestionBtn").addEventListener("click", () => addQuestion());
  document.getElementById("generateBtn").addEventListener("click", generateQuizData);

  document.getElementById("copyBtn").addEventListener("click", async () => {
    await navigator.clipboard.writeText(output.value);
    alert("е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ");
  });

  document.getElementById("downloadBtn").addEventListener("click", () => {
    const blob = new Blob([output.value], { type: "application/javascript" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "quizData.js";
    a.click();
  });

  // й»ҳи®Өж·»еҠ дёҖдёӘзӨәдҫӢй—®йў?
  addQuestion({
    question: "зӨәдҫӢй—®йўҳпјҡдҪ жңҖе–ңж¬ўзҡ„еҠЁзү©пјҹ",
    pic: "example.jpg",
    answers: [
      { answer: "зҢ?, aPic: "", aId: 1 },
      { answer: "зӢ?, aPic: "", aId: 2 }
    ]
  });
</script>
</body>
</html>
