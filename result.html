<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Results з”ҹжҲҗеҷ?/title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <link rel="preconnect" href="https://consent.cookiebot.com">
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="dns-prefetch" href="https://consent.cookiebot.com">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 0 15px;
    }
    h1 { font-size: 22px; }
    input, textarea {
      width: 100%;
      padding: 6px;
      margin: 4px 0 10px;
      box-sizing: border-box;
    }
    .result {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    button {
      padding: 6px 10px;
      margin: 4px;
      border-radius: 6px;
      border: 1px solid #2b7cff;
      background-color: #2b7cff;
      color: white;
      cursor: pointer;
    }
    button.secondary {
      background: #f2f2f2;
      color: #333;
      border-color: #ccc;
    }
    textarea#output {
      height: 250px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<h1>Results з”ҹжҲҗеҷ?/h1>

<div id="resultsContainer"></div>
<button id="addResultBtn">пј?ж·»еҠ з»“жһңйЎ?/button>

<h2>з”ҹжҲҗзҡ?JS</h2>
<textarea id="output" readonly></textarea><br>
<button id="generateBtn">з”ҹжҲҗ results</button>
<button id="copyBtn" class="secondary">еӨҚеҲ¶еҲ°еүӘиҙҙжқҝ</button>
<button id="downloadBtn" class="secondary">дёӢиҪҪ JS ж–Үд»¶</button>

<script>
  const container = document.getElementById("resultsContainer");
  const output = document.getElementById("output");

  // ж·»еҠ з»“жһңйЎ?
  function addResult(data = null) {
    const idx = container.children.length + 1;
    const div = document.createElement("div");
    div.className = "result";
    div.innerHTML = `
      <h3>з»“жһң ${idx}</h3>
      <label>ж Үйўҳ (title)</label>
      <input class="rTitle" placeholder="дҫӢеҰӮпјҡJe suis un chat VR..." value="${data?.title || ''}">
      <label>з»“жһңж Үйўҳ (resultTitle)</label>
      <input class="rResultTitle" placeholder="дҫӢеҰӮпјҡChat Peureux" value="${data?.resultTitle || ''}">
      <label>жҸҸиҝ° (description)</label>
      <textarea class="rDescription" placeholder="з»“жһңжҸҸиҝ°...">${data?.description || ''}</textarea>
      <label>дё»еӣҫ (mainPic)</label>
      <input class="rMainPic" placeholder="еӣҫзүҮURLжҲ–ж–Үд»¶еҗҚ" value="${data?.mainPic || ''}">
      <button class="removeR secondary">еҲ йҷӨжӯӨз»“жһ?/button>
    `;
    div.querySelector(".removeR").addEventListener("click", () => div.remove());
    container.appendChild(div);
  }

  // з”ҹжҲҗ results
  function generateResults() {
    const resultObjs = {};
    let i = 1;
    document.querySelectorAll(".result").forEach(r => {
      resultObjs[i] = {
        title: r.querySelector(".rTitle").value.trim(),
        resultTitle: r.querySelector(".rResultTitle").value.trim(),
        description: r.querySelector(".rDescription").value.trim(),
        mainPic: r.querySelector(".rMainPic").value.trim()
      };
      i++;
    });

    const jsText = "const results = " + JSON.stringify(resultObjs, null, 2) + ";";
    output.value = jsText;
    return jsText;
  }

  // дәӢд»¶з»‘е®ҡ
  document.getElementById("addResultBtn").addEventListener("click", () => addResult());
  document.getElementById("generateBtn").addEventListener("click", generateResults);

  document.getElementById("copyBtn").addEventListener("click", async () => {
    await navigator.clipboard.writeText(output.value);
    alert("е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ");
  });

  document.getElementById("downloadBtn").addEventListener("click", () => {
    const blob = new Blob([output.value], { type: "application/javascript" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "results.js";
    a.click();
  });

  // й»ҳи®Өж·»еҠ еӣӣдёӘзӨәдҫӢз»“жһң
  const sampleData = [
    {
      title:"Je suis un chat VR : Trouvez la vraie personnalitГ© de votre chat avec ce quiz. ",
      resultTitle:"Chat Peureux",
      description:"Vous ГӘtes toujours prudent, vous cachez dГЁs le premier signe de danger (ou un aspirateur !)...",
      mainPic:"https://identityinsight.org/testCommon4/img/fr_img/3365bc96fe79d4a3f732986ad20263ec.jpeg"
    },
    {
      title:"Je suis un chat VR : Trouvez la vraie personnalitГ© de votre chat avec ce quiz. ",
      resultTitle:"Chat Curieux",
      description:"Rien n'Г©chappe Г  votre attention. Vous explorez toujours et mettez votre nez partout...",
      mainPic:"https://identityinsight.org/testCommon4/img/fr_img/1794a11c650125dc9d20ddf3b2284f69.jpeg"
    }
  ];
  sampleData.forEach(d => addResult(d));
</script>
</body>
</html>
